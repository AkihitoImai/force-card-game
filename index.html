<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>力のカードゲーム Web版</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.8;
      background: #f7f7f7;
    }

    h1 {
      color: #333;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    button {
      font-size: 18px;
      padding: 12px 20px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      background: #2f6fed;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1f55c8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>力のカードゲーム Web版</h1>

    <p>
      この教材では，力の名称，力のつりあい，作用・反作用の関係を練習します。
    </p>

    <button onclick="alert('ここにレベル1を作っていきます')">
      レベル1：力の名称を確認する
    </button>
    <br>

    <button onclick="alert('ここにレベル2を作っていきます')">
      レベル2：力のつりあいを確認する
    </button>
    <br>

    <button onclick="alert('ここにレベル3を作っていきます')">
      レベル3：作用・反作用を確認する
    </button>
  </div>
</body>
</html>
